<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<title>IronLog</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0A0A0A;--surface:#161616;--surface2:#1E1E1E;--surface3:#252525;
  --border:#2A2A2A;--accent:#4F8EF7;--accent-dim:rgba(79,142,247,.15);
  --green:#22C55E;--red:#EF4444;--yellow:#F59E0B;--purple:#A78BFA;
  --text:#F0F0F0;--text2:#888;--text3:#484848;
  --nav-h:60px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
[data-theme="light"]{
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#E8E8ED;--surface3:#DCDCE1;
  --border:#D1D1D6;--text:#0A0A0A;--text2:#666;--text3:#BBB;
  --accent-dim:rgba(79,142,247,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.tb{padding:calc(var(--st) + 10px) 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:1px}
.tb-title em{color:var(--accent);font-style:normal}
.tb-actions{display:flex;gap:8px}
.icon-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center}
/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--sb) + 8px)}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sb));padding-bottom:var(--sb);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 0;transition:color .15s;font-family:'DM Sans',sans-serif}
.nb.active{color:var(--accent)}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb span{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;border:none;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-sm{padding:7px 14px;font-size:14px;border-radius:9px}
.btn-full{width:100%}
/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:var(--accent-dim);color:var(--accent)}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-yellow{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-purple{background:rgba(167,139,250,.15);color:var(--purple)}
/* INPUT */
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px}
.input:focus{outline:none;border-color:var(--accent)}
.input-sm{padding:8px 6px;font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;text-align:center;width:100%}
.input-sm:focus{outline:none;border-color:var(--accent)}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);display:flex;align-items:flex-end}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:93dvh;overflow-y:auto;padding-bottom:calc(var(--sb) + 16px);animation:slideUp .28s ease}
.modal-full{border-radius:0;max-height:100dvh;min-height:100dvh;padding-top:var(--st)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdr{position:sticky;top:0;background:var(--surface);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:10}
.mhdr h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800}
.mclose{background:var(--surface2);border:none;width:30px;height:30px;border-radius:50%;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
/* SECTION LABEL */
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:18px 16px 8px}
/* WEEK VIEW */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.week-nav-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.week-nav-btns{display:flex;gap:4px}
.week-nav-btns button{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.day-card{margin:0 16px 9px;padding:13px 14px;border-radius:13px;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px;transition:transform .1s}
.day-card:active{transform:scale(.98)}
.day-card.today{border-color:var(--accent)}
.day-dot{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface2)}
.day-dot.today{background:var(--accent)}
.day-dot .dow{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text2);letter-spacing:.5px}
.day-dot.today .dow{color:rgba(255,255,255,.75)}
.day-dot .dn{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;line-height:1}
.day-dot.today .dn{color:#fff}
.day-info{flex:1;min-width:0}
.day-wname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-meta{font-size:12px;color:var(--text2);margin-top:2px}
.start-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 13px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.deload-tag{font-size:10px;font-weight:700;background:var(--yellow);color:#000;padding:2px 7px;border-radius:4px;letter-spacing:.5px}
/* VOLUME BARS */
.vol-wrap{margin:0 16px 16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:13px}
.vol-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.vol-row{margin-bottom:7px}
.vol-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:3px}
.vol-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.vol-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.vol-fill.over{background:var(--red)}
/* LIBRARY */
.search-wrap{padding:10px 16px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 6px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.fchip{white-space:nowrap;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.fchip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ex-row{padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:12px}
.ex-row:active{background:var(--surface2)}
.ex-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}
.ex-name{font-weight:600;font-size:14px}
.ex-meta{font-size:12px;color:var(--text2);margin-top:2px}
/* PROGRESS */
.prog-ex-btn{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:13px;margin:0 16px;cursor:pointer}
.prog-ex-name{font-weight:600}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.stat-v{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800}
.stat-l{font-size:12px;color:var(--text2);margin-top:2px}
.chart-wrap{padding:0 16px 16px}
.chart-canvas-wrap{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
.heatmap-wrap{padding:0 16px 16px}
.heatmap-grid{display:grid;grid-template-columns:repeat(15,1fr);gap:3px}
.hcell{aspect-ratio:1;border-radius:2px;background:var(--surface2)}
.hcell.done{background:var(--green)}
.hcell.missed{background:rgba(239,68,68,.25)}
/* SETTINGS */
.srow{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border)}
.srow-l .slbl{font-weight:500;font-size:15px}
.srow-l .ssub{font-size:12px;color:var(--text2);margin-top:2px}
.toggle{width:48px;height:26px;border-radius:13px;background:var(--surface2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(22px)}
.seg{display:flex;background:var(--surface2);border-radius:9px;padding:2px}
.seg-b{padding:6px 18px;border-radius:7px;border:none;background:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.seg-b.active{background:var(--accent);color:#fff}
/* ACTIVE WORKOUT */
.wks{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;animation:slideUp .28s ease}
.wk-hdr{padding:calc(var(--st) + 12px) 16px 12px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wk-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800}
.wk-timer-badge{font-family:'DM Mono',monospace;font-size:12px;background:var(--surface2);padding:4px 10px;border-radius:20px;color:var(--text2)}
.wk-timer-badge.run{color:var(--accent);background:var(--accent-dim)}
.wk-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px}
.wk-footer{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(var(--sb) + 12px);background:var(--bg);border-top:1px solid var(--border);display:flex;gap:10px}
.ex-section-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;padding:14px 16px 4px;display:flex;align-items:center;gap:8px}
.pr-tag{font-size:10px;font-weight:700;color:var(--yellow);background:rgba(245,158,11,.15);padding:2px 6px;border-radius:4px}
.set-hdr{display:grid;grid-template-columns:28px 1fr 1fr 1fr 40px;gap:6px;padding:6px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 40px;gap:6px;padding:7px 16px;border-bottom:1px solid var(--border);align-items:center}
.set-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);text-align:center}
.set-chk{width:36px;height:36px;border-radius:9px;border:2px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:transparent;font-size:16px}
.set-chk.done{background:var(--green);border-color:var(--green);color:#fff;font-weight:bold}
.set-row.done-row{opacity:.6}
/* REST TIMER */
.rest-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.rest-num{font-family:'Barlow Condensed',sans-serif;font-size:100px;font-weight:800;color:var(--accent);line-height:1}
.rest-lbl{font-size:14px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
.rest-bar-wrap{width:200px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.rest-bar{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear}
/* TEMPLATE BUILDER */
.tex-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;margin:0 16px 10px;overflow:hidden}
.tex-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tex-name{font-weight:600;font-size:14px}
.tex-set-hdr{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:6px;padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-top:1px solid var(--border)}
.tex-set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:6px;padding:7px 14px;border-top:1px solid var(--border);align-items:center}
/* PLATE CALC */
.plate{display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:#fff;padding:0 6px;height:36px;margin:2px;min-width:36px}
/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.5}
/* MISC */
.p16{padding:16px}
.px16{padding-left:16px;padding-right:16px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.flex{display:flex}
.flex-c{display:flex;align-items:center}
.flex-cb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}
.gap12{gap:12px}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.text-a{color:var(--accent)}
.text-g{color:var(--green)}
.text-r{color:var(--red)}
.text-m{color:var(--text2)}
.text-y{color:var(--yellow)}
.mono{font-family:'DM Mono',monospace}
.bold{font-weight:600}
.heading{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800}
.divider{height:1px;background:var(--border);margin:4px 0}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bounce-in{animation:bounceIn .2s ease}
@keyframes bounceIn{0%{transform:scale(.85)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>

// ===========================

const getWeekStart = (offset=0) => {
  const d = new Date();
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day===0?6:day-1) + offset*7);
  mon.setHours(0,0,0,0);
  return mon;
};
const getWeekKey = (offset=0) => {
  const d = getWeekStart(offset);
  return `${d.getFullYear()}-W${String(d.getDate()).padStart(2,'0')}${d.getMonth()}`;
};
const getDayDates = (offset=0) => {
  const start = getWeekStart(offset);
  return Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d;});
};
const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const todayIdx = () => {
  const d = new Date().getDay();
  return d===0?6:d-1;
};
const isToday = (date) => {
  const t = new Date();
  return date.getDate()===t.getDate()&&date.getMonth()===t.getMonth()&&date.getFullYear()===t.getFullYear();
};
const formatDate = (d) => `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;

const e1rm = (w,r) => r===1?w:Math.round(w*(1+r/30));
const fw = (w) => `${w} ${S.settings.unit}`;

const getExercise = (id) => EXERCISES.find(e=>e.id===id);
const getTemplate = (id) => S.templates.find(t=>t.id===id);

const getWeekPlan = () => {
  const k = getWeekKey(NAV.weekOffset);
  if(!S.weekPlans[k]) S.weekPlans[k]={isDeload:false,days:Array(7).fill(null)};
  return S.weekPlans[k];
};

const getExLogs = (exId) => {
  const sets=[];
  S.logs.forEach(log=>{
    log.exercises.forEach(le=>{
      if(le.exerciseId===exId){
        le.sets.filter(s=>s.completed).forEach(s=>{
          sets.push({date:log.date,reps:s.reps,weight:s.weight,e1:e1rm(s.weight||0,s.reps||0)});
        });
      }
    });
  });
  return sets;
};
const getExPR = (exId) => {
  const logs = getExLogs(exId);
  if(!logs.length) return null;
  return logs.reduce((best,s)=>s.weight>best.weight?s:best,logs[0]);
};

const getMuscleVolume = () => {
  const vol={};
  const plan = getWeekPlan();
  plan.days.forEach(d=>{
    if(!d||!d.templateId) return;
    const t = getTemplate(d.templateId);
    if(!t) return;
    t.exercises.forEach(te=>{
      const ex = getExercise(te.exerciseId);
      if(!ex) return;
      const muscles = [...ex.pm,...ex.sm.slice(0,1)];
      muscles.forEach(m=>{
        vol[m] = (vol[m]||0) + (te.sets||[]).length;
      });
    });
  });
  return vol;
};

const THIRTY_DAYS_MS = 30 * 24 * 60 * 60 * 1000;
const SNOOZE_DAYS_MS = 7 * 24 * 60 * 60 * 1000;

const shouldPromptExport = () => {
  // Don't prompt if there's nothing worth backing up
  if(!S.templates.length && !S.logs.length) return false;
  // Don't prompt if snoozed
  if(S.settings.exportSnoozedUntil && Date.now() < S.settings.exportSnoozedUntil) return false;
  // Prompt if never exported OR last export was 30+ days ago
  if(!S.settings.lastExport) return true;
  return (Date.now() - new Date(S.settings.lastExport).getTime()) >= THIRTY_DAYS_MS;
};

const daysUntilNextExport = () => {
  if(!S.settings.lastExport) return 0;
  const diff = THIRTY_DAYS_MS - (Date.now() - new Date(S.settings.lastExport).getTime());
  return Math.max(0, Math.ceil(diff / (24*60*60*1000)));
};

const renderWeek = () => {
  const plan = getWeekPlan();
  const dates = getDayDates(NAV.weekOffset);
  const today = todayIdx();
  const offset = NAV.weekOffset;

  const startStr = formatDate(dates[0]);
  const endStr = formatDate(dates[6]);
  const weekLabel = offset===0?'This Week':offset===-1?'Last Week':offset===1?'Next Week':`${startStr} – ${endStr}`;

  let html = `<div class="week-nav">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="week-nav-title">${weekLabel}</div>
      ${plan.isDeload?'<span class="deload-tag">DELOAD</span>':''}
    </div>
    <div class="week-nav-btns">
      <button data-action="deload-toggle" title="Toggle deload week" style="${plan.isDeload?'color:var(--yellow)':''}">🔄</button>
      <button data-action="week-prev">‹</button>
      <button data-action="week-today" style="font-size:11px;font-weight:700;width:auto;padding:0 8px">TODAY</button>
      <button data-action="week-next">›</button>
    </div>
  </div>`;

  dates.forEach((date,i)=>{
    const dayPlan = plan.days[i];
    const tmpl = dayPlan?.templateId ? getTemplate(dayPlan.templateId) : null;
    const isRest = dayPlan?.isRest;
    const isTd = isToday(date) && offset===0;
    const exerciseCount = tmpl ? tmpl.exercises.length : 0;
    const setCount = tmpl ? tmpl.exercises.reduce((s,e)=>s+(e.sets?.length||0),0) : 0;

    html += `<div class="day-card ${isTd?'today':''} ${isRest?'rest':''}" data-action="open-day" data-day="${i}">
      <div class="day-dot ${isTd?'today':''}">
        <span class="dow">${DAY_NAMES[i]}</span>
        <span class="dn">${date.getDate()}</span>
      </div>
      <div class="day-info">
        <div class="day-wname">${isRest?'Rest Day':tmpl?tmpl.name:'Tap to plan'}</div>
        <div class="day-meta">${tmpl?`${exerciseCount} exercises · ${setCount} sets`:isRest?'Recovery':'No workout assigned'}</div>
      </div>
      ${tmpl&&!isRest?`<button class="start-btn" data-action="start-workout" data-day="${i}">▶ START</button>`:'<span style="color:var(--text3);font-size:20px">›</span>'}
    </div>`;
  });

  // Volume section
  const vol = getMuscleVolume();
  const volEntries = Object.entries(vol).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(volEntries.length){
    const max = Math.max(...volEntries.map(([,v])=>v));
    html += `<div class="slabel">WEEKLY VOLUME</div>
    <div class="vol-wrap">
      <div class="vol-title"><span>Sets per Muscle Group</span><span class="text-xs text-m">Optimal: 10–20 sets</span></div>
      ${volEntries.map(([m,v])=>`
        <div class="vol-row">
          <div class="vol-lbl"><span>${m}</span><span class="mono">${v} sets ${v>20?'⚠️':v<10?'📉':''}</span></div>
          <div class="vol-track"><div class="vol-fill ${v>20?'over':''}" style="width:${Math.min(100,(v/Math.max(max,20))*100)}%"></div></div>
        </div>`).join('')}
    </div>`;
  }

  html += `<div style="height:8px"></div>`;
  return html;
};

const initProgressChart = () => {
  // Heatmap
  const hm = document.getElementById('heatmap');
  if(hm){
    const logDates = new Set(S.logs.map(l=>l.date.slice(0,10)));
    let html='';
    for(let i=89;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=d.toISOString().slice(0,10);
      html+=`<div class="hcell ${logDates.has(k)?'done':''}" title="${k}"></div>`;
    }
    hm.innerHTML=html;
  }

  // Chart
  const canvas = document.getElementById('prog-chart');
  if(!canvas||!NAV.progEx) return;
  const logs = getExLogs(NAV.progEx);
  const dayMap={};
  logs.forEach(l=>{const d=l.date.slice(0,10);if(!dayMap[d]||l.e1>dayMap[d])dayMap[d]=l.e1;});
  const sorted = Object.entries(dayMap).sort((a,b)=>a[0]>b[0]?1:-1);
  if(!sorted.length) return;

  if(NAV.progChart){try{NAV.progChart.destroy();}catch(e){}}
  const isDark = S.settings.theme!=='light';
  NAV.progChart = new Chart(canvas,{
    type:'line',
    data:{
      labels:sorted.map(([d])=>d.slice(5)),
      datasets:[{

const exportData = () => {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    appName: 'IronLog',
    data: {
      settings: S.settings,
      templates: S.templates,
      weekPlans: S.weekPlans,
      logs: S.logs
    }
  };

  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironlog-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);

  S.settings.lastExport = new Date().toISOString();
  save();
  render();
};

const triggerImport = () => {
  const input = document.getElementById('import-file-input');
  if(!input) return;
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const payload = JSON.parse(ev.target.result);
        if(!payload.appName || payload.appName !== 'IronLog' || !payload.data) {
          alert('This file doesn\'t look like a valid IronLog backup.');
          return;
        }
        NAV.modal = {type:'import-confirm', data:{payload}};
        render();
      } catch(err) {
        alert('Could not read the file. Make sure it\'s a valid IronLog backup (.json).');
      }
    };
    reader.readAsText(file);
    input.value = '';
  };
  input.click();
};

const renderModal = (app) => {
  if(!NAV.modal) return;
  const {type,data} = NAV.modal;

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'modal-overlay';

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.id = 'modal-body';

  if(type==='day') modal.innerHTML = renderDayModal(data.dayIdx);
  else if(type==='exercise') modal.innerHTML = renderExerciseModal(data.exId);
  else if(type==='template-builder') modal.innerHTML = renderTemplateBuilderModal(data.templateId);
  else if(type==='template-list') modal.innerHTML = renderTemplateListModal();
  else if(type==='splits') modal.innerHTML = renderSplitsModal();
  else if(type==='ex-picker') modal.innerHTML = renderExPickerModal(data);
  else if(type==='progress-ex-picker') modal.innerHTML = renderProgressExPickerModal();
  else if(type==='import-confirm') modal.innerHTML = renderImportConfirmModal(data.payload);
  else if(type==='import-success'){ modal.innerHTML = renderImportSuccessModal(); modal.style.borderRadius='20px 20px 0 0'; }
  else if(type==='auto-export') modal.innerHTML = renderAutoExportModal();

  overlay.appendChild(modal);
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  app.appendChild(overlay);

  // Post-modal hooks
  if(type==='template-builder') setTimeout(()=>initTemplateBuilderListeners(),0);
  if(type==='ex-picker'||type==='progress-ex-picker'){
    const si = document.getElementById('modal-search');
    if(si) si.addEventListener('input',e=>{
      data.search=e.target.value;
      document.getElementById('modal-body').innerHTML = type==='progress-ex-picker'?renderProgressExPickerModal(e.target.value):renderExPickerModal({...data});
    });
  }
};

const startWorkout = (dayIdx) => {
  const plan = getWeekPlan();
  const dayPlan = plan.days[dayIdx];
  if(!dayPlan?.templateId) return;
  const tmpl = getTemplate(dayPlan.templateId);
  if(!tmpl) return;

  NAV.workout = {
    id: uid(),
    templateId: tmpl.id,
    templateName: tmpl.name,
    startTime: Date.now(),
    exercises: tmpl.exercises.map(te=>({
      exerciseId: te.exerciseId,
      sets: (te.sets||[]).map(s=>({reps:s.r,weight:s.w||0,actualReps:s.r,actualWeight:s.w||0,completed:false}))
    }))
  };
  NAV.modal = null;
  render();
};

const renderActiveWorkout = () => {

  const totalSets = w.exercises.reduce((s,e)=>s+e.sets.length,0);

    <div>
      <div class="wk-title">${w.templateName}</div>

  <div class="wk-content">`;

  w.exercises.forEach((we,ei)=>{
    const ex = getExercise(we.exerciseId);
    if(!ex) return;

    const msUrl = getMsUrl(we.exerciseId);
    html += `<div class="ex-section-title">
      <span>${ex.name}</span>

      ${pr?`<span class="text-xs text-m">PR: ${fw(pr.weight)} × ${pr.reps}</span>`:''}
      ${msUrl?`<a href="${msUrl}" target="_blank" rel="noopener" style="margin-left:auto;display:flex;align-items:center;gap:4px;background:#FF0000;color:#fff;border-radius:7px;padding:4px 10px;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M23.495 6.205a3.007 3.007 0 0 0-2.088-2.088c-1.87-.501-9.396-.501-9.396-.501s-7.507-.01-9.396.501A3.007 3.007 0 0 0 .527 6.205a31.247 31.247 0 0 0-.522 5.805 31.247 31.247 0 0 0 .522 5.783 3.007 3.007 0 0 0 2.088 2.088c1.868.502 9.396.502 9.396.502s7.506 0 9.396-.502a3.007 3.007 0 0 0 2.088-2.088 31.247 31.247 0 0 0 .5-5.783 31.247 31.247 0 0 0-.5-5.805zM9.609 15.601V8.408l6.264 3.602z"/></svg>Demo</a>`:''}
    </div>
    <div class="set-hdr"><span class="col-label">#</span><span class="col-label">Reps</span><span class="col-label">Weight</span><span class="col-label">e1RM</span><span></span></div>`;
    we.sets.forEach((s,si)=>{
      const calcE1 = s.actualWeight&&s.actualReps ? e1rm(s.actualWeight,s.actualReps) : '-';
      html += `<div class="set-row ${s.completed?'done-row':''}" data-ei="${ei}" data-si="${si}">
        <span class="set-num">${si+1}</span>
        <input class="input-sm" type="number" value="${s.actualReps}" min="0" data-action="wk-set-reps" data-ei="${ei}" data-si="${si}" ${s.completed?'disabled':''}>
        <input class="input-sm" type="number" value="${s.actualWeight}" min="0" data-action="wk-set-weight" data-ei="${ei}" data-si="${si}" ${s.completed?'disabled':''} ${ex.wt!=='weighted'?'style="opacity:.4" disabled':'placeholder="'+fw(0).split(' ')[0]+'"'}>
        <span class="mono text-sm text-m" style="text-align:center">${ex.wt==='weighted'?calcE1:ex.wt==='timed'?`${s.actualReps}s`:'BW'}</span>
        <button class="set-chk ${s.completed?'done':''}" data-action="wk-complete-set" data-ei="${ei}" data-si="${si}">${s.completed?'✓':''}</button>
      </div>`;
    });
    html += `<button class="btn btn-ghost btn-sm" style="margin:6px 16px 2px;font-size:13px" data-action="wk-add-set" data-ei="${ei}">+ Add Set</button>`;

  html += '</div>';

  const footer = document.createElement('div');
  footer.className = 'wk-footer';
  footer.innerHTML = `
    <button class="btn btn-ghost" style="flex:0 0 auto" data-action="cancel-workout">✕ Cancel</button>
    <button class="btn ${allDone?'btn-success':'btn-primary'} btn-full" data-action="finish-workout">${allDone?'✅ Finish Workout':'Finish Workout'}</button>`;
  div.appendChild(footer);

  // Elapsed timer
  setTimeout(()=>{
    const el = document.getElementById('wk-elapsed');
    if(el&&NAV.workout){
      const e2=Math.floor((Date.now()-NAV.workout.startTime)/1000);
      const m=Math.floor(e2/60),s=e2%60;
      el.textContent=`${m}:${String(s).padStart(2,'0')}`;

const renderRestOverlay = () => {
  const rt = NAV.restTimer;
  const div = document.createElement('div');
  div.className = 'rest-overlay';
  const pct = ((rt.total-rt.secs)/rt.total)*100;
  div.innerHTML = `
    <div class="rest-lbl">REST TIMER</div>
    <div class="rest-num">${rt.secs}</div>
    <div class="rest-bar-wrap"><div class="rest-bar" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:10px;margin-top:12px">
      <button class="btn btn-ghost btn-sm" data-action="rest-add" data-val="-15">−15s</button>
      <button class="btn btn-ghost btn-sm" data-action="rest-add" data-val="15">+15s</button>
    </div>
    <button class="btn btn-ghost" data-action="skip-rest" style="margin-top:8px">Skip Rest</button>`;
  return div;
};

const startRestTimer = () => {
  const total = S.settings.restTimer;
  if(NAV.restTimer?.interval) clearInterval(NAV.restTimer.interval);
  NAV.restTimer = {secs:total,total,interval:null};
  NAV.restTimer.interval = setInterval(()=>{
    if(!NAV.restTimer) return;
    NAV.restTimer.secs--;
    if(NAV.restTimer.secs<=0){
      clearInterval(NAV.restTimer.interval);
      NAV.restTimer=null;
      render();
      return;
    }
    // Update overlay if present
    const overlay = document.querySelector('.rest-overlay');
    if(overlay){
      const num = overlay.querySelector('.rest-num');
      const bar = overlay.querySelector('.rest-bar');
      if(num) num.textContent=NAV.restTimer.secs;
      if(bar) bar.style.width=`${((NAV.restTimer.total-NAV.restTimer.secs)/NAV.restTimer.total)*100}%`;
    }
  },1000);
  render();
};

const finishWorkout = () => {
  if(!NAV.workout) return;
  const log = {
    id: NAV.workout.id,
    date: new Date().toISOString(),
    templateId: NAV.workout.templateId,
    templateName: NAV.workout.templateName,
    exercises: NAV.workout.exercises
  };
  S.logs.push(log);
  save();
  if(NAV.restTimer?.interval) clearInterval(NAV.restTimer.interval);
  NAV.restTimer=null;
  NAV.workout=null;
  NAV.tab='progress';
  render();
};

// ===========================
// PLATE CALCULATOR
// ===========================
const calcPlates = (target) => {
  const barWeight = S.settings.barWeight||45;
  if(target<=barWeight) return [];
  const plateSizes = S.settings.unit==='kg'
    ? [25,20,15,10,5,2.5,1.25]
    : [45,35,25,10,5,2.5];
  let remaining = (target - barWeight)/2;
  const plates=[];
  plateSizes.forEach(p=>{
    while(remaining>=p-0.001){remaining-=p;plates.push(p);}
  });
  return plates;
};

const plateColors = {45:'#EF4444',35:'#3B82F6',25:'#22C55E',10:'#F59E0B',5:'#A78BFA',2.5:'#888',25.0:'#22C55E',20:'#3B82F6',15:'#F59E0B',10.0:'#F59E0B',5.0:'#A78BFA',2.5:'#888',1.25:'#666'};

const updatePlateCalc = () => {
  const inp = document.getElementById('plate-input');
  const res = document.getElementById('plate-result');
  if(!inp||!res) return;
  const target = parseFloat(inp.value);
  if(!target||isNaN(target)){res.innerHTML='Enter a target weight above.';return;}
  const plates = calcPlates(target);
  const bar = S.settings.barWeight||45;
  if(!plates.length){res.innerHTML=`Just the bar (${bar} ${S.settings.unit})`;return;}
  const html = `<div style="margin-bottom:6px;font-weight:600;font-size:13px">Each side:</div>
    <div>${plates.map(p=>`<span class="plate" style="background:${plateColors[p]||'#555'};width:${28+p}px">${p}</span>`).join('')}</div>
    <div style="margin-top:8px;color:var(--text2);font-size:12px">Bar ${bar} + ${plates.reduce((s,p)=>s+p*2,0)} = ${bar+plates.reduce((s,p)=>s+p*2,0)} ${S.settings.unit}</div>`;
  res.innerHTML=html;
};

document.addEventListener('click',e=>{
  // NAV tabs (must check before early return)
  const tabBtn = e.target.closest('.nb[data-tab]');
  if(tabBtn){ NAV.tab=tabBtn.dataset.tab; render(); return; }

  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action==='close-modal'){closeModal();return;}

  // Week actions
  if(action==='week-prev'){NAV.weekOffset--;render();return;}
  if(action==='week-next'){NAV.weekOffset++;render();return;}
  if(action==='week-today'){NAV.weekOffset=0;render();return;}
  if(action==='open-day'){NAV.modal={type:'day',data:{dayIdx:+el.dataset.day}};render();return;}
  if(action==='start-workout'||action==='start-from-modal'){
    const dayIdx = +el.dataset.day;
    startWorkout(dayIdx);
    return;
  }
  if(action==='toggle-rest'){
    const di=+el.dataset.day;
    const plan=getWeekPlan();
    if(!plan.days[di]) plan.days[di]={};
    plan.days[di].isRest=!plan.days[di].isRest;
    if(plan.days[di].isRest) plan.days[di].templateId=null;
    save();closeModal();return;
  }
  if(action==='remove-day-workout'){
    const di=+el.dataset.day;
    const plan=getWeekPlan();
    if(plan.days[di]) plan.days[di].templateId=null;
    save();closeModal();return;
  }
  if(action==='choose-template'){
    const di=+el.dataset.day;
    NAV.modal={type:'ex-picker', data:{_isTemplatePicker:true,dayIdx:di,search:'',catFilter:'All'}};
    // Actually open template picker not exercise picker
    NAV.modal={type:'template-picker',data:{dayIdx:di}};
    openTemplatePicker(di);
    return;
  }

  // Library
  if(action==='lib-filter'){NAV.libFilter=el.dataset.cat;render();return;}
  if(action==='open-exercise'){NAV.modal={type:'exercise',data:{exId:el.dataset.exid}};render();return;}

  // Progress
  if(action==='open-ex-picker'){NAV.modal={type:'progress-ex-picker',data:{}};render();return;}
  if(action==='pick-prog-ex'){NAV.progEx=el.dataset.exid;closeModal();return;}

  // Splits
  if(action==='open-splits'){NAV.modal={type:'splits',data:{}};render();return;}
  if(action==='load-split'){loadSplit(+el.dataset.split);return;}

  // Template list
  if(action==='open-template-list'){NAV.modal={type:'template-list',data:{}};render();return;}
  if(action==='new-template'){TB_STATE=null;NAV.modal={type:'template-builder',data:{templateId:null}};render();return;}
  if(action==='edit-template'){TB_STATE=null;NAV.modal={type:'template-builder',data:{templateId:el.dataset.tid}};render();return;}
  if(action==='delete-template'){
    S.templates=S.templates.filter(t=>t.id!==el.dataset.tid);
    save();render();return;
  }

  // Template builder
  if(action==='tb-add-exercise'){
    NAV.modal={type:'ex-picker',data:{_forBuilder:true,search:'',catFilter:'All'}};
    render();return;
  }
  if(action==='tb-add-set'){
    const ei=+el.dataset.ei;
    if(TB_STATE){
      const lastSet=TB_STATE.exercises[ei].sets.slice(-1)[0]||{r:10,w:0};
      TB_STATE.exercises[ei].sets.push({r:lastSet.r,w:lastSet.w,n:''});
      document.getElementById('tb-exercises').innerHTML=renderTBExercises();
    }
    return;
  }
  if(action==='tb-remove-set'){
    const ei=+el.dataset.ei,si=+el.dataset.si;
    if(TB_STATE){TB_STATE.exercises[ei].sets.splice(si,1);document.getElementById('tb-exercises').innerHTML=renderTBExercises();}
    return;
  }
  if(action==='tb-remove-ex'){
    const ei=+el.dataset.ei;
    if(TB_STATE){TB_STATE.exercises.splice(ei,1);document.getElementById('tb-exercises').innerHTML=renderTBExercises();}
    return;
  }
  if(action==='tb-save'){
    if(!TB_STATE||!TB_STATE.name.trim()){alert('Please give your template a name.');return;}
    const existing=S.templates.findIndex(t=>t.id===TB_STATE.id);
    if(existing>=0) S.templates[existing]=TB_STATE;
    else S.templates.push(TB_STATE);
    TB_STATE=null;
    save();closeModal();return;
  }
  if(action==='pick-exercise'){
    if(NAV.modal?.data?._forBuilder&&TB_STATE){
      const exId=el.dataset.exid;
      if(!TB_STATE.exercises.find(te=>te.exerciseId===exId)){
        TB_STATE.exercises.push({exerciseId:exId,sets:[{r:10,w:0,n:''}]});
      }
      NAV.modal={type:'template-builder',data:{templateId:TB_STATE.id}};
      render();
    }
    return;
  }
  if(action==='ex-picker-cat'){
    if(NAV.modal) NAV.modal.data.catFilter=el.dataset.cat;
    document.getElementById('modal-body').innerHTML=renderExPickerModal(NAV.modal.data);
    setTimeout(()=>{
      const si=document.getElementById('modal-search');
      if(si) si.addEventListener('input',e2=>{NAV.modal.data.search=e2.target.value;document.getElementById('modal-body').innerHTML=renderExPickerModal(NAV.modal.data);});
    },0);
    return;
  }

  // Active workout
  if(action==='wk-complete-set'){
    const ei=+el.dataset.ei,si=+el.dataset.si;
    if(NAV.workout){
      const set=NAV.workout.exercises[ei].sets[si];
      set.completed=!set.completed;
      if(set.completed) startRestTimer();
      else { if(NAV.restTimer?.interval) clearInterval(NAV.restTimer.interval); NAV.restTimer=null; render(); }
      render();
    }
    return;
  }
  if(action==='wk-add-set'){
    const ei=+el.dataset.ei;
    if(NAV.workout){
      const lastSet=NAV.workout.exercises[ei].sets.slice(-1)[0]||{reps:10,weight:0};
      NAV.workout.exercises[ei].sets.push({reps:lastSet.reps,weight:lastSet.weight,actualReps:lastSet.actualReps||lastSet.reps,actualWeight:lastSet.actualWeight||lastSet.weight,completed:false});
      render();
    }
    return;
  }
  if(action==='cancel-workout'){
    if(confirm('Cancel this workout? Progress will be lost.')){
      if(NAV.restTimer?.interval) clearInterval(NAV.restTimer.interval);
      NAV.restTimer=null;NAV.workout=null;render();
    }
    return;
  }
  if(action==='finish-workout'){finishWorkout();return;}
  if(action==='skip-rest'){
    if(NAV.restTimer?.interval) clearInterval(NAV.restTimer.interval);
    NAV.restTimer=null;render();return;
  }
  if(action==='rest-add'){
    if(NAV.restTimer) NAV.restTimer.secs=Math.max(1,NAV.restTimer.secs+(+el.dataset.val));
    return;
  }

  // Settings
  if(action==='set-unit'){S.settings.unit=el.dataset.val;save();render();return;}
  if(action==='toggle-theme'){S.settings.theme=S.settings.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=S.settings.theme;save();render();return;}
  if(action==='set-rest'){S.settings.restTimer=+el.dataset.val;save();render();return;}
  if(action==='set-bar'){S.settings.barWeight=+el.dataset.val;save();render();setTimeout(updatePlateCalc,0);return;}
  if(action==='deload-toggle'){
    const plan=getWeekPlan();plan.isDeload=!plan.isDeload;save();render();return;
  }
  if(action==='export-data'){exportData();return;}
  if(action==='import-data'){triggerImport();return;}
  if(action==='confirm-import'){confirmImport(NAV.modal.data.payload);return;}
  if(action==='auto-export-now'){autoExportNow();return;}
  if(action==='auto-export-snooze'){snoozeExport();return;}
  if(action==='auto-export-skip'){skipExportMonth();return;}
});

const loadSplit = (splitIdx) => {
  const split = PRESET_SPLITS[splitIdx];
  if(!split) return;

  // Create templates
  const templateIds = split.templates.map(t=>{
    const id = uid();
    S.templates.push({
      id, name: t.name,
      exercises: t.exs.map(te=>({
        exerciseId: te.id,
        sets: te.sets.map(s=>({r:s.r,w:s.w,n:''}))
      }))
    });
    return id;
  });

  // Assign to current week
  const plan = getWeekPlan();
  split.days.forEach((tIdx,i)=>{
    if(tIdx===-1) plan.days[i]={isRest:true};
    else plan.days[i]={templateId:templateIds[tIdx]};
  });

  save();
  closeModal();
};

const openTemplatePicker = (dayIdx) => {
  if(!S.templates.length){
    NAV.modal={type:'template-list',data:{}};render();return;
  }
  // Show inline overlay
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  if(!body) return;
  body.innerHTML = `<div class="mhdr"><h2>CHOOSE WORKOUT</h2><button class="mclose" data-action="close-modal">✕</button></div>
  ${S.templates.map(t=>`
    <div class="card card-pressable" style="margin:0 16px 10px;cursor:pointer" data-action="assign-template" data-tid="${t.id}" data-day="${dayIdx}">
      <div style="padding:14px">
        <div class="bold">${t.name}</div>
        <div class="text-sm text-m mt8">${t.exercises.length} exercises</div>
      </div>
    </div>`).join('')}
  <div class="p16">
    <button class="btn btn-ghost btn-full" data-action="new-template">+ Create New Template</button>
  </div>`;
};

document.addEventListener('click', e=>{
  const el = e.target.closest('[data-action="assign-template"]');
  if(el){
    const tid=el.dataset.tid, di=+el.dataset.day;
    const plan=getWeekPlan();
    if(!plan.days[di]) plan.days[di]={};
    plan.days[di].templateId=tid;
    plan.days[di].isRest=false;
    save();closeModal();
  }
});

// HELPERS
// ===========================
const escH = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ===========================
// INIT
// ===========================
loadState();
render();

// Auto-export check — runs 1.5s after open so app is fully loaded first
setTimeout(()=>{
  if(shouldPromptExport()){
    NAV.modal = {type:'auto-export', data:{}};
    render();
  }
}, 1500);

// Start elapsed timer for active workout
setInterval(()=>{
  if(!NAV.workout) return;
  const el=document.getElementById('wk-elapsed');
  if(!el) return;
  const elapsed=Math.floor((Date.now()-NAV.workout.startTime)/1000);
  const m=Math.floor(elapsed/60),s=elapsed%60;
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
},1000);

</script>
</body>
